<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área Protegida - BPO</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;

  /* 🎯 FUNDO PROFISSIONAL (equilibrado) */
  background:
    linear-gradient(120deg, #e9f0ec 0%, #f7f9f8 40%, #eef3f1 100%);

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ================= BOX ================= */
.box{
  background:white;
  padding:35px;
  border-radius:14px;
  width:360px;
  text-align:center;

  /* sombra premium suave */
  box-shadow:
    0 12px 30px rgba(0,0,0,0.12);

  transition:0.3s;
}

.box:hover{
  transform: translateY(-4px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.15);
}

/* LOGO */
.logo{
  width:110px;
  margin-bottom:15px;
}

/* títulos */
h2{
  color:#0f6b3c;
  margin-bottom:10px;
  font-weight:600;
}

/* aviso */
.warning{
  color:#c1121f;
  font-weight:600;
  margin-bottom:15px;
}

/* ================= INPUT ================= */
input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #d0d5d3;
  margin-bottom:15px;
  text-align:center;
  font-size:15px;
  transition:0.2s;
}

input:focus{
  outline:none;
  border-color:#0f6b3c;
  box-shadow:0 0 0 3px rgba(15,107,60,0.12);
}

/* ================= BOTÕES ================= */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

/* verde elegante */
.green{
  background:#0f6b3c;
}
.green:hover{
  background:#0c5a32;
}

/* azul */
.blue{
  background:#2c3e50;
}
.blue:hover{
  background:#1f2a36;
}

/* vermelho */
.red{
  background:#c1121f;
}
.red:hover{
  background:#8b0f18;
}

/* ================= MENU ================= */
.menu{
  display:none;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{ opacity:0; transform: translateY(8px); }
  to{ opacity:1; transform: translateY(0); }
}

/* ================= LOADER ================= */
.loader{
  display:none;
  width:40px;
  height:40px;
  border:4px solid #e0e6e3;
  border-top:4px solid #0f6b3c;
  border-radius:50%;
  margin:20px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin{
  0%{ transform: rotate(0deg); }
  100%{ transform: rotate(360deg); }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">

  <img src="logo.png" class="logo">

  <h2>🔒 Área Protegida</h2>

  <div class="warning">⚠️ Acesso restrito</div>

  <input type="password" id="pass" placeholder="Introduzir password">

  <button class="green" onclick="check()">Entrar</button>

  <div class="loader" id="loader"></div>

</div>

<!-- MENU -->
<div class="box menu" id="menuBox">

  <img src="logo.png" class="logo">

  <h2>📊 Painel Controlo BPO</h2>

  <button class="blue" onclick="openEquipa()">
    👥 Gestão de Equipa
  </button>

  <button class="green" onclick="openProducao()">
    📁 Gestão de Produções
  </button>

  <button class="red" onclick="logout()">
    🚪 Sair
  </button>

</div>

<script>

function check(){
  const pass = document.getElementById("pass").value;
  const loader = document.getElementById("loader");

  if(pass === "12345"){

    loader.style.display="block";

    setTimeout(()=>{
      document.getElementById("loginBox").style.display="none";
      document.getElementById("menuBox").style.display="block";
    },700);

  } else {
    alert("❌ Password incorreta");
  }
}

function logout(){
  document.getElementById("menuBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
  document.getElementById("pass").value="";
  document.getElementById("loader").style.display="none";
}

function openEquipa(){
  window.location.href = "GestãoEquipaBPO.html";
}

function openProducao(){
  window.location.href = "GestãoProduçõesBPO.html";
}

</script>

</body>
</html>
