<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Painel Controlo NSS</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

/* ================= LOGIN ================= */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f6b3c,#19a463);
}

.box {
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

.box input {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.box button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#19a463;
  color:white;
  border:none;
  cursor:pointer;
}

/* ================= APP ================= */
#app {
  display:none;
}

/* HEADER */
.header {
  background:linear-gradient(90deg,#0f6b3c,#19a463);
  color:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu button {
  margin-left:10px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn-blue {
  background:#2c3e50;
  color:white;
}

.btn-red {
  background:#c1121f;
  color:white;
}

/* CONTENT */
.content {
  padding:20px;
}

/* ÁREA DINÂMICA */
#view {
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:10px;
  min-height:300px;
}

/* LOGO */
.logo {
  width:120px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>🔐 Área Protegida</h3>
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <div>📊 Painel Controlo - NSS _Serviços Administrativos Fidelidade</div>

    <div class="menu">
      <button class="btn-blue" onclick="loadView('equipa')">
        Gestão de Equipa
      </button>

      <button class="btn-blue" onclick="loadView('producao')">
        Gestão de Produções
      </button>

      <button class="btn-red" onclick="logout()">
        Sair
      </button>
    </div>
  </div>

  <div class="content">

    <!-- área onde muda tudo -->
    <div id="view">

      <img src="logo.png" class="logo">

      <h2>Bem-vindo ao sistema</h2>
      <p>Escolhe uma opção no menu acima.</p>

    </div>

  </div>
</div>

<script>

function login(){
  const pass = document.getElementById("pass").value;

  if(pass === "12345"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Senha incorreta");
  }
}

function logout(){
  document.getElementById("login").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("pass").value = "";
  document.getElementById("view").innerHTML = "";
}

/* ================= CARREGAR VIEWS ================= */
function loadView(page){

  const view = document.getElementById("view");

  if(page === "equipa"){
    view.innerHTML = `
      <img src="logo.png" class="logo">
      <h2>Gestão de Equipa</h2>
      <p>Aqui vai entrar o teu HTML da equipa.</p>
    `;
  }

  if(page === "producao"){
    view.innerHTML = `
      <img src="logo.png" class="logo">
      <h2>Gestão de Produções</h2>
      <p>Aqui vai entrar o teu HTML de produções.</p>
    `;
  }
}

</script>

</body>
</html>
