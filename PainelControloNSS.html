<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área Protegida - BPO</title>

<style>

body{
  margin:0;
  font-family: 'Inter', Arial;

  background: url("fundo.png") no-repeat center center fixed;
  background-size: cover;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.box{
  background: rgba(255,255,255,0.9);
  padding:40px;
  border-radius:18px;
  width:320px;
  text-align:center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.logo{
  width:140px;
  margin-bottom:15px;
}

/* BOTÃO */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#19a463,#0f6b3c);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;

  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);
}

/* CAIXA MODAL */
.modal-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:280px;
  text-align:center;
}

.modal-box input{
  width:200px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  text-align:center;
  display:block;
  margin:10px auto;
}

/* ERRO INLINE */
.error{
  color:#c1121f;
  font-size:14px;
  margin-top:8px;
  height:18px;
}.titulo{
  color:#0f6b3c;
  margin-bottom:20px;
  font-weight:700;
}

</style>
</head>

<body>

<!-- CARD INICIAL -->
<div class="box">
  <img src="logo.png" class="logo">

  <h2 class="titulo">Dashboard Gestão BPO</h2>

  <button onclick="openModal()">Entrar</button>
</div>

<!-- MODAL PASSWORD -->
<div class="modal" id="modal">

  <div class="modal-box">

    <h3>🔐 Acesso</h3>

    <input type="password" id="pass" placeholder="Introduzir password">

    <div id="errorMsg" class="error"></div>

    <button onclick="check()">Entrar</button>

    <button onclick="closeModal()" style="margin-top:8px; background:#c1121f;">
      Cancelar
    </button>

  </div>

</div>

<script>

/* ABRIR MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

/* FECHAR MODAL */
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("pass").value="";
  document.getElementById("errorMsg").innerText="";
}

/* LOGIN */
function check(){
  const pass = document.getElementById("pass").value;
  const error = document.getElementById("errorMsg");

  if(pass === "12345"){
    window.location.href = "GestãoEquipaBPO.html";
  } else {
    error.innerText = "❌ Password incorreta";
  }
}

/* ENTER */
document.getElementById("pass").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    check();
  }
});

</script>

</body>
</html>
