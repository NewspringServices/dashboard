<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área Protegida - BPO</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family: 'Inter', 'Segoe UI', Arial, sans-serif;

  background: linear-gradient(135deg, #e9f2ee 0%, #f6f8f7 50%, #eaf3ef 100%);

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
/* BOTÕES BASE */
button{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
  transition: all 0.2s ease;
  box-shadow: 0 8px 18px rgba(0,0,0,0.12);
}

/* MODAL mais controlado */
.modal-box{
  background: rgba(255,255,255,0.92);
  padding:25px;
  border-radius:14px;
  width:330px;
  text-align:center;
}

/* inputs consistentes */
.modal-box input,
.modal-box button{
  width:100%;
  box-sizing:border-box;
}

/* ================= TOAST ================= */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:12px 16px;
  border-radius:10px;
  color:white;
  font-weight:600;
  display:none;
  z-index:9999;
  box-shadow:0 12px 30px rgba(0,0,0,0.18);
  backdrop-filter: blur(8px);
}

/* ================= CARD PRINCIPAL ================= */
.box{
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);

  padding:40px;
  border-radius:18px;
  width:380px;
  text-align:center;

  box-shadow: 0 20px 50px rgba(0,0,0,0.12);

  transition: all 0.25s ease;
  border: 1px solid rgba(255,255,255,0.4);
}

.box:hover{
  transform: translateY(-6px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}

.logo{
  width:100%;
  max-width:260px;
  height:150px;
  object-fit:contain;
  margin-bottom:18px;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
}

/* TITULOS */
h2{
  color:#0f6b3c;
  margin:10px 0;
  font-weight:700;
  letter-spacing:0.3px;
}

.warning{
  color:#c1121f;
  font-weight:600;
  margin-bottom:14px;
  font-size:14px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #d9e2dc;
  margin-bottom:10px;
  text-align:center;
  font-size:15px;
  transition:0.2s;
  background:#fff;
}

input:focus{
  outline:none;
  border-color:#19a463;
  box-shadow:0 0 0 3px rgba(25,164,99,0.15);
}

/* ================= BOTÕES ================= */
button{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;

  transition: all 0.2s ease;
  box-shadow: 0 8px 18px rgba(0,0,0,0.12);
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.18);
}

/* cores modernas */
.green{
  background: linear-gradient(135deg,#19a463,#0f6b3c);
}

.blue{
  background: linear-gradient(135deg,#2c3e50,#1f2a36);
}

.red{
  background: linear-gradient(135deg,#e74c3c,#b71c1c);
}

/* ================= MENU ================= */
.menu{
  display:none;
}

/* ================= LOADER ================= */
.loader{
  display:none;
  width:42px;
  height:42px;
  border:4px solid #e6eeea;
  border-top:4px solid #19a463;
  border-radius:50%;
  margin:18px auto;
  animation: spin 0.9s linear infinite;
}

@keyframes spin{
  100%{ transform: rotate(360deg); }
}

/* ================= MODAL ================= */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);

  display:none;
  justify-content:center;
  align-items:center;
  z-index:9998;

  backdrop-filter: blur(6px);
}

.modal-box{
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);

  padding:25px;
  border-radius:14px;
  width:330px;
  text-align:center;

  box-shadow:0 25px 60px rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.4);
}

.modal-box h3{
  margin-bottom:10px;
  color:#0f6b3c;
  font-weight:700;
}

</style>
</head>

<body>

<!-- 🔥 TOAST -->
<div id="toast"></div>

<!-- 🔥 MODAL PASSWORD -->
<div id="modal">
  <div class="modal-box">
    <h3>🗄️ Acesso Dados da BD</h3>
    <input type="password" id="bgpass" placeholder="Introduz password">
    <button class="green" onclick="checkBackground()">Entrar</button>
    <button class="red" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">

  <img src="logo.png" class="logo">


  <div class="warning">⚠️ Acesso restrito</div>

  <input type="password" id="pass" placeholder="Introduzir password">

  <button class="green" onclick="check()">Entrar</button>

  <div class="loader" id="loader"></div>

</div>

<!-- MENU -->
<div class="box menu" id="menuBox">

  <img src="logo.png" class="logo">

  <h2>📊 Painel Controlo BPO</h2>

  <button class="blue" onclick="openEquipa()">👥 Gestão de Equipa</button>
  <button class="green" onclick="openProducao()">📁 Gestão de Produções</button>
  <button class="blue" onclick="openBackground()">🗄️ Gestão Dados BD</button>
  <button class="red" onclick="logout()">🚪 Sair</button>

</div>

<script>

/* TOAST */
function showToast(msg, color="#c1121f"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = color;
  t.style.display = "block";

  setTimeout(()=> t.style.display="none", 2500);
}

/* LOGIN */
function check(){
  const pass = document.getElementById("pass").value;
  const loader = document.getElementById("loader");

  if(pass === "12345"){

    loader.style.display="block";

    setTimeout(()=>{
      document.getElementById("loginBox").style.display="none";
      document.getElementById("menuBox").style.display="block";
    },700);

  } else {
    showToast("❌ Password incorreta");
  }
}

/* 🔥 ABRIR MODAL */
function openBackground(){
  document.getElementById("modal").style.display="flex";
}

/* 🔥 FECHAR MODAL */
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("bgpass").value="";
}

/* 🔥 VALIDAR PASSWORD BACKGROUND */
function checkBackground(){
  const pass = document.getElementById("bgpass").value;

  if(pass === "Telma00"){
    window.location.href = "GestãodadosBD.html";
  } else {
    showToast("❌ Password incorreta");
  }
}

/* LOGOUT */
function logout(){
  document.getElementById("menuBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
  document.getElementById("pass").value="";
  document.getElementById("loader").style.display="none";
}

function openEquipa(){
  window.location.href = "GestãoEquipaBPO.html";
}

function openProducao(){
  window.location.href = "GestãoProduçõesBPO.html";
}

</script>

</body>
</html>
