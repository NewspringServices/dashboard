<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área Protegida - BPO</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;

  background:
    linear-gradient(120deg, #eef2f0 0%, #f9fbfa 50%, #eef3f1 100%);

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ================= TOAST ================= */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:12px 18px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  display:none;
  z-index:9999;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* ================= BOX ================= */
.box{
  background:white;
  padding:35px;
  border-radius:14px;
  width:360px;
  text-align:center;

  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
  transition:0.3s;
}

.box:hover{
  transform: translateY(-4px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.15);
}

.logo{
  width:110px;
  margin-bottom:15px;
}

h2{
  color:#0f6b3c;
  margin-bottom:10px;
  font-weight:600;
}

.warning{
  color:#c1121f;
  font-weight:600;
  margin-bottom:15px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #d0d5d3;
  margin-bottom:10px;
  text-align:center;
  font-size:15px;
  box-sizing:border-box;
}

/* BOTÕES */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  box-sizing:border-box;
}

.green{ background:#0f6b3c; }
.green:hover{ background:#0c5a32; }

.blue{ background:#2c3e50; }
.blue:hover{ background:#1f2a36; }

.red{ background:#c1121f; }
.red:hover{ background:#8b0f18; }

/* MENU */
.menu{
  display:none;
}

/* LOADER */
.loader{
  display:none;
  width:40px;
  height:40px;
  border:4px solid #e0e6e3;
  border-top:4px solid #0f6b3c;
  border-radius:50%;
  margin:20px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin{
  0%{ transform: rotate(0deg); }
  100%{ transform: rotate(360deg); }
}

/* ================= MODAL PASSWORD ================= */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9998;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.modal-box h3{
  margin-bottom:10px;
  color:#0f6b3c;
}

</style>
</head>

<body>

<!-- 🔥 TOAST -->
<div id="toast"></div>

<!-- 🔥 MODAL PASSWORD -->
<div id="modal">
  <div class="modal-box">
    <h3>🗄️ Acesso Background BD</h3>
    <input type="password" id="bgpass" placeholder="Introduz password">
    <button class="green" onclick="checkBackground()">Entrar</button>
    <button class="red" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">

  <img src="logo.png" class="logo">

  <h2>🔒 Newspring Services</h2>

  <div class="warning">⚠️ Acesso restrito</div>

  <input type="password" id="pass" placeholder="Introduzir password">

  <button class="green" onclick="check()">Entrar</button>

  <div class="loader" id="loader"></div>

</div>

<!-- MENU -->
<div class="box menu" id="menuBox">

  <img src="logo.png" class="logo">

  <h2>📊 Painel Controlo BPO</h2>

  <button class="blue" onclick="openEquipa()">👥 Gestão de Equipa</button>
  <button class="green" onclick="openProducao()">📁 Gestão de Produções</button>
  <button class="blue" onclick="openBackground()">🗄️ Gestão Dados BD</button>
  <button class="red" onclick="logout()">🚪 Sair</button>

</div>

<script>

/* TOAST */
function showToast(msg, color="#c1121f"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = color;
  t.style.display = "block";

  setTimeout(()=> t.style.display="none", 2500);
}

/* LOGIN */
function check(){
  const pass = document.getElementById("pass").value;
  const loader = document.getElementById("loader");

  if(pass === "12345"){

    loader.style.display="block";

    setTimeout(()=>{
      document.getElementById("loginBox").style.display="none";
      document.getElementById("menuBox").style.display="block";
    },700);

  } else {
    showToast("❌ Password incorreta");
  }
}

/* 🔥 ABRIR MODAL */
function openBackground(){
  document.getElementById("modal").style.display="flex";
}

/* 🔥 FECHAR MODAL */
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("bgpass").value="";
}

/* 🔥 VALIDAR PASSWORD BACKGROUND */
function checkBackground(){
  const pass = document.getElementById("bgpass").value;

  if(pass === "Telma00"){
    window.location.href = "GestãodadosBD.html";
  } else {
    showToast("❌ Password incorreta");
  }
}

/* LOGOUT */
function logout(){
  document.getElementById("menuBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
  document.getElementById("pass").value="";
  document.getElementById("loader").style.display="none";
}

function openEquipa(){
  window.location.href = "GestãoEquipaBPO.html";
}

function openProducao(){
  window.location.href = "GestãoProduçõesBPO.html";
}

</script>

</body>
</html>
