<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área Protegida - BPO</title>

<style>

body{
  margin:0;
  font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #e9f2ee 0%, #f6f8f7 50%, #eaf3ef 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.box{
  background: rgba(255,255,255,0.9);
  padding:40px;
  border-radius:18px;
  width:360px;
  text-align:center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.12);
}

.logo{
  width:100%;
  max-width:260px;
  height:150px;
  object-fit:contain;
  margin-bottom:18px;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
}

/* TEXTO */
.warning{
  color:#c1121f;
  font-weight:600;
  margin-bottom:15px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
  text-align:center;
}

/* BOTÃO */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#19a463,#0f6b3c);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* LOADER */
.loader{
  display:none;
  width:40px;
  height:40px;
  border:4px solid #eee;
  border-top:4px solid #19a463;
  border-radius:50%;
  margin:15px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin{
  100%{ transform: rotate(360deg); }
}

/* TOAST */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  display:none;
}

</style>
</head>

<body>

<div id="toast"></div>

<div class="box">

  <img src="logo.png" class="logo">

  <div class="warning">⚠️ Acesso restrito</div>

  <input type="password" id="pass" placeholder="Introduzir password">

  <button onclick="check()">Entrar</button>

  <div class="loader" id="loader"></div>

</div>

<script>

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = "#c1121f";
  t.style.display = "block";

  setTimeout(()=> t.style.display="none", 2500);
}

/* LOGIN DIRETO */
function check(){
  const pass = document.getElementById("pass").value;
  const loader = document.getElementById("loader");

  if(pass === "12345"){

    loader.style.display="block";

    setTimeout(()=>{
      window.location.href = "GestãoEquipaBPO.html";
    },500);

  } else {
    showToast("❌ Password incorreta");
  }
}

/* ENTER = LOGIN */
document.getElementById("pass").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    check();
  }
});

</script>

</body>
</html>
