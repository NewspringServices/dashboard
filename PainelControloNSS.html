<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área Protegida - BPO</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f3d2e,#19a463);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ================= BOX ================= */
.box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:340px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* LOGO */
.logo{
  width:110px;
  margin-bottom:15px;
}

/* títulos */
h2{
  color:#0f6b3c;
  margin-bottom:10px;
}

/* aviso */
.warning{
  color:#c1121f;
  font-weight:bold;
  margin-bottom:15px;
}

/* input */
input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-bottom:15px;
  text-align:center;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:#19a463;
  box-shadow:0 0 0 2px rgba(25,164,99,0.2);
}

/* botão base */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  margin-top:10px;
}

/* cores */
.green{ background:#19a463; }
.green:hover{ background:#148a52; }

.blue{ background:#2c3e50; }
.blue:hover{ background:#1f2a36; }

.red{ background:#c1121f; }
.red:hover{ background:#8b0f18; }

/* menu escondido */
.menu{
  display:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">

  <img src="logo.png" class="logo">

  <h2>🔒 Área Protegida</h2>

  <div class="warning">⚠️ Acesso restrito à equipa autorizada</div>

  <input type="password" id="pass" placeholder="Introduzir password">

  <button class="green" onclick="check()">Entrar</button>

</div>

<!-- MENU -->
<div class="box menu" id="menuBox">

  <img src="logo.png" class="logo">

  <h2>📊 Painel BPO</h2>

  <button class="blue" onclick="openEquipa()">
    👥 Gestão de Equipa
  </button>

  <button class="green" onclick="openProducao()">
    📦 Gestão de Produções
  </button>

  <button class="red" onclick="logout()">
    🚪 Sair
  </button>

</div>

<script>

function check(){
  const pass = document.getElementById("pass").value;

  if(pass === "12345"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("menuBox").style.display="block";
  } else {
    alert("❌ Password incorreta");
  }
}

function logout(){
  document.getElementById("menuBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
  document.getElementById("pass").value="";
}

function openEquipa(){
  window.location.href = "GestãoEquipaBPO.html";
}

function openProducao(){
  window.location.href = "GestãoProduçõesBPO.html";
}

</script>

</body>
</html>
