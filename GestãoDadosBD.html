<!DOCTYPE html>
<html lang="pt">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Planeamento BPO + Gestão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
/* ======================================================
   RESET
====================================================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
h3{
  color:white;
  margin-bottom:10px;
}

/* ======================================================
   BODY (MESMO DO DASHBOARD 1)
====================================================== */
body{
  font-family:'Roboto',sans-serif;
  background:
    linear-gradient(
      135deg,
      #0f1720 0%,
      #13232f 25%,
      #163c2d 60%,
      #1fa463 100%
    );

  min-height:100vh;
  color:#1e293b;
  overflow-x:hidden;
}

/* fundo blur */
body::before{
  content:'';
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at top left,
      rgba(255,255,255,0.08),
      transparent 30%),
    radial-gradient(circle at bottom right,
      rgba(255,255,255,0.05),
      transparent 25%);

  pointer-events:none;
}

/* ======================================================
   HEADER (MODERNO)
====================================================== */
.header{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 24px;

  background:rgba(12,18,22,0.82);
  backdrop-filter:blur(14px);

  border-bottom:1px solid rgba(255,255,255,0.08);

  box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

/* ======================================================
   TITLE 3D
====================================================== */
.title-3d{
  font-size:20px;
  font-weight:600;
  color:white;
  letter-spacing:0.3px;

  text-shadow:0 2px 10px rgba(0,0,0,0.3);
}

/* ======================================================
   TABS (MODERNAS)
====================================================== */
.tabs{
  display:flex;
  gap:8px;

  padding:14px 18px;

  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(10px);

  border-bottom:1px solid rgba(255,255,255,0.08);
}

.tab{
  padding:12px 18px;
  border-radius:10px;

  cursor:pointer;
  transition:0.25s ease;

  color:white;
  font-weight:500;
}

.tab:hover{
  background:rgba(255,255,255,0.08);
}

.tab.active{
  background:linear-gradient(135deg,#1db56c,#169b5b);
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

/* ======================================================
   VIEWS
====================================================== */
.view{
  display:none;
  padding:20px;
}

.view.active{
  display:block;
}

/* ======================================================
   BOTÕES (IGUAL DASHBOARD 1)
====================================================== */
button{
  border:none;
  border-radius:10px;

  padding:8px 14px;

  font-weight:600;
  font-size:11px;

  cursor:pointer;

  transition:0.25s ease;

  color:white;

  background:linear-gradient(135deg,#1db56c,#149a59);

  box-shadow:0 6px 18px rgba(0,0,0,0.18);
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.28);
  filter:brightness(1.05);
}

/* botão azul verde escuro */
.btn-blue{
  background:linear-gradient(135deg,#1db56c,#149a59);
}

/* vermelho logout */
.btn-red{
  background:linear-gradient(135deg,#dc2626,#991b1b);
}

/* ======================================================
   INPUTS (MODERNOS)
====================================================== */
input{
  padding:10px 12px;

  border-radius:10px;
  border:1px solid rgba(0,0,0,0.08);

  background:white;

  font-size:11px;

  transition:0.2s;
}

input:focus{
  border-color:#19a463;
  box-shadow:0 0 0 4px rgba(25,164,99,0.15);
}

/* ======================================================
   TABLE (MODERNA)
====================================================== */
table{
  width:100%;
  margin-top:15px;

  border-collapse:collapse;

  border-radius:18px;
  overflow:hidden;

  background:white;

  font-size:11px;

  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

thead{
  background:linear-gradient(135deg,#0f5132,#19a463);
}

th{
  color:white;
  padding:10px 8px;
  text-align:left;
  font-weight:600;
}

td{
  padding:8px;
  border-bottom:1px solid #edf2f7;
}

tbody tr:hover{
  background:#f4fff8;
}

/* ======================================================
   SCROLLBAR
====================================================== */
::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-thumb{
  background:#19a463;
  border-radius:20px;
}

::-webkit-scrollbar-track{
  background:#e5e7eb;
}
</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <!-- ESQUERDA -->
  <div style="display:flex; align-items:center; gap:12px;">
    <img src="logo2.png" style="height:42px;">
    <div class="title-3d">
      Portal Supervisor
    </div>
  </div>

  <!-- DIREITA -->
  <div class="header-actions">
    <button class="btn-blue" onclick="goMenu()">🏠 Logout</button>

    <button onclick="goGestaoEquipa()">
      👥 Gestão Logins & Retirados
    </button>

    <button onclick="goGestaoProducoes()">
      📊 Gestão Produções
    </button>
  </div>

</div>


</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab(0)">📅 Planeamento</div>
  <div class="tab" onclick="showTab(1)">📋 Gestão de Registos</div>
</div>

<!-- ================= PLANEAMENTO ================= -->
<div class="view active" id="view0">

  <h3>📅 Planeamento</h3>

  <input type="file" id="filePlaneamento" onchange="loadExcel(event)">

  <button onclick="loadPlaneamento()">🔄 Atualizar Planeamento</button>
  <button onclick="saveToSupabase()">💾 Guardar no Supabase</button>

  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>User</th>
        <th>Nome</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody id="planeamentoTable"></tbody>
  </table>

</div>

<!-- ================= GESTÃO DADOS ================= -->
<div class="view" id="view1">

  <h3>📋Gestão de Registos Supabase</h3>

  <input id="filtroTexto" placeholder="Filtrar user ou nome..." onkeyup="renderRegistos()">
  <input type="date" id="filtroData" onchange="renderRegistos()">

  <button onclick="loadRegistos()">🔄 Atualizar Registos</button>

  <table>
    <thead>
   <tr>
  <th>User</th>
  <th>Nome</th>
  <th>Tipo</th>
  <th>Data</th>
  <th>Hora</th>
  <th>Ação</th>
</tr>
    </thead>

    <tbody id="registosTable"></tbody>
  </table>

</div>

<script>

const SUPABASE_URL = 'https://bijndfsxrzjviwrdvwms.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpam5kZnN4cnpqdml3cmR2d21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA4NTA5NTIsImV4cCI6MjA2NjQyNjk1Mn0.EWaFInuqTaxvnjytb40DdnflEbBrbSYcViKLYc_kKBk';const client = supabase.createClient(SUPABASE_URL, SUPABASE_API_KEY);

/* ================= TABS ================= */
function showTab(i){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[i].classList.add("active");

  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view" + i).classList.add("active");
}

function excelDateToJSDate(serial){
  // 🔥 cria data diretamente sem UTC shift
  const date = new Date(Math.round((serial - 25569) * 86400 * 1000));

  const day = String(date.getDate()).padStart(2,'0');
  const month = String(date.getMonth() + 1).padStart(2,'0');
  const year = date.getFullYear();

  return `${year}-${month}-${day}`;
}
/* ================= PLANEAMENTO ================= */
let planeamentoData = [];

async function loadPlaneamento(){

  const { data, error } = await client
    .from("planeamento")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    console.log("Erro Supabase:", error);
    return;
  }

  console.log("Planeamento carregado:", data);

  planeamentoData = data || [];
  renderPlaneamento();
}

async function saveToSupabase(){

  if(!planeamentoData || planeamentoData.length === 0){
    alert("Não há dados para guardar");
    return;
  }

  const payload = planeamentoData.map(r => ({
    data: r.data,
    user: r.user,
    nome: r.nome,
    estado: r.estado
  }));

  const { error } = await client
    .from("planeamento")
    .insert(payload);

  if(error){
    console.error(error);
    alert("Erro ao guardar no Supabase ❌");
  } else {
    alert("Guardado com sucesso no Supabase ✅");
    loadPlaneamento();
  }
}
async function deleteRow(id){

  console.log("A apagar ID:", id);

  const { error } = await client
    .from("BPO_registosNSS")
    .delete()
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Erro ao apagar no Supabase ❌");
    return;
  }

  alert("Apagado com sucesso ✅");
  loadRegistos();
}
function goGestaoEquipa(){
  window.location.href = "GestãoEquipaBPO.html";
}

function goGestaoProducoes(){
  window.location.href = "GestãoProduçõesBPO.html";
}

/* ================= EXCEL ================= */
function loadExcel(event){
  const file = event.target.files[0];

  if(!file){
    alert("Escolhe um ficheiro Excel");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    console.log("Excel carregado:", json);

    planeamentoData = json.map(r => {

      const rawDate = r.data ?? r.Data;

      return {
        data: typeof rawDate === "number"
          ? excelDateToJSDate(rawDate)
          : rawDate || "",

        user: r.user || r.User || "",
        nome: r.nome || r.Nome || "",
        estado: r.estado || r.Estado || ""
      };

    });

    renderPlaneamento();
  };

  reader.readAsArrayBuffer(file);
}

/* ================= RENDER ================= */
function renderPlaneamento(){
  const tbody = document.getElementById("planeamentoTable");
  tbody.innerHTML = "";

  planeamentoData.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${r.data}</td>
        <td>${r.user}</td>
        <td>${r.nome}</td>
        <td>${r.estado}</td>
      </tr>
    `;
  });
}

/* ================= REGISTOS ================= */
let registosData = [];

async function loadRegistos(){
  const { data } = await client
    .from("BPO_registosNSS")
    .select("*")
    .order("created_at",{ascending:false});

  registosData = data;
  renderRegistos();
}

function renderRegistos(){

  const txt = document.getElementById("filtroTexto")?.value?.toLowerCase() || "";
  const dt = document.getElementById("filtroData")?.value || "";

  const tbody = document.getElementById("registosTable");
  tbody.innerHTML = "";

  registosData
    .filter(r => {

      const okText =
        (r.user||"").toLowerCase().includes(txt) ||
        (r.nome||"").toLowerCase().includes(txt);

      const okDate = dt ? String(r.data||"").slice(0,10) === dt : true;

      return okText && okDate;
    })
    .forEach(r => {

      const hora = r.created_at
        ? new Date(r.created_at).toLocaleTimeString('pt-PT', {
            hour: '2-digit',
            minute: '2-digit'
          })
        : '';

   tbody.innerHTML += `
  <tr>
    <td>${r.user}</td>
    <td>${r.nome}</td>
    <td>${r.tipo}</td>
    <td>${r.data||''}</td>
    <td>${hora}</td>
    <td>
      <button onclick="deleteRow('${r.id}')">✖️ Apagar</button>
    </td>
  </tr>
`;
    });
}

/* DELETE */
async function deleteRow(id){
  if(!confirm("Apagar?")) return;

  await client.from("BPO_registosNSS").delete().eq("id",id);
  loadRegistos();
}

/* NAV */
function goMenu(){
  window.location.href = "PainelControloNSS.html";
}

</script>

</body>
</html>
