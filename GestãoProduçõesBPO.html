<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Tarefas Submetidas - Plataforma Newspring</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body {
  font-family: Arial;
  background:#f4f6f8;
  margin:0;
}

/* ================= HEADER ================= */
.header {
  background: linear-gradient(90deg,#0f6b3c,#19a463);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* botões header */
.header-actions {
  display:flex;
  gap:10px;
}

/* ================= BOTÕES ================= */
button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

/* verde */
.btn-green {
  background:#19a463;
  color:white;
}
.btn-green:hover {
  background:#148a52;
}

/* azul */
.btn-blue {
  background:#2c3e50;
  color:white;
}
.btn-blue:hover {
  background:#1f2a36;
}

/* vermelho */
.btn-red {
  background:#c1121f;
  color:white;
}
.btn-red:hover {
  background:#8b0f18;
}

/* ================= TABS ================= */
.tabs {
  display:flex;
  background:white;
  border-bottom:1px solid #ddd;
}

.tab {
  padding:12px 18px;
  cursor:pointer;
}

.tab.active {
  border-bottom:3px solid #19a463;
  font-weight:bold;
}

/* ================= VIEWS ================= */
.view { display:none; padding:20px; }
.view.active { display:block; }

/* ================= TABLE ================= */
table {
  width:100%;
  background:white;
  border-collapse:collapse;
  margin-top:10px;
  border-radius:8px;
  overflow:hidden;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

th {
  background:#0f6b3c;
  color:white;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>📁 Tarefas Submetidas - Plataforma Newspring</div>

  <div class="header-actions">
    <button class="btn-blue" onclick="goMenu()">🏠 Menu Principal</button>
    <button class="btn-red" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab(0)">📋 Dados</div>
  <div class="tab" onclick="showTab(1)">📊 Resumo tarefas</div>
</div>

<!-- TAB 1 -->
<div class="view active" id="tab0">

<div style="padding:20px;">

<input type="date" id="startDate" onchange="render()">
<input type="date" id="endDate" onchange="render()">

<input id="filterColaborador" placeholder="Filtrar colaborador..." onkeyup="render()">
<input id="filterTarefa" placeholder="Filtrar tarefa..." onkeyup="render()">

<button class="btn-green" onclick="exportExcel()">📤 Export Excel</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Data</th>
<th>Colaborador</th>
<th>Tipologia</th>
<th>Processo Gama</th>
<th>Documentos</th>
<th>Tarefa Finalizada</th>
<th>Início</th>
<th>Fim</th>
<th>Tempo</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>
</div>

<!-- TAB 2 -->
<div class="view" id="tab1">

<div style="padding:20px;">

<h3>📊 Resumo por tarefa</h3>

<input id="taskUserFilter" placeholder="Filtrar colaborador..." onkeyup="renderTaskSummary()">
<input type="date" id="taskStart" onchange="renderTaskSummary()">
<input type="date" id="taskEnd" onchange="renderTaskSummary()">

<table>
<thead>
<tr>
<th>Colaborador</th>
<th>Tarefa</th>
<th>Total Documentos</th>
</tr>
</thead>
<tbody id="taskTable"></tbody>
</table>

</div>
</div>

<script>

const SUPABASE_URL = 'https://bijndfsxrzjviwrdvwms.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpam5kZnN4cnpqdml3cmR2d21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA4NTA5NTIsImV4cCI6MjA2NjQyNjk1Mn0.EWaFInuqTaxvnjytb40DdnflEbBrbSYcViKLYc_kKBk';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_API_KEY);

let allData = [];

/* ================= LOAD ================= */
async function load(){
  const { data } = await client
    .from('BPO_dadosprodução')
    .select('*')
    .order('created_at',{ascending:true});

  allData = data || [];
  render();
  renderTaskSummary();
}

/* ================= NAV ================= */
function showTab(i){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[i].classList.add('active');

  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tab'+i).classList.add('active');
}

function goMenu(){
  window.location.href = "teste.html";
}

function logout(){
  window.location.href = "2teste.html";
}

/* ================= TEMPO ================= */
function calcTempo(inicio, fim){
  if(!inicio || !fim) return '';
  const diff = (new Date(fim) - new Date(inicio)) / 60000;
  const h = Math.floor(diff / 60);
  const m = Math.floor(diff % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* ================= TABLE ================= */
function render(){

  const fCol = document.getElementById('filterColaborador').value?.toLowerCase()||'';
  const fTar = document.getElementById('filterTarefa').value?.toLowerCase()||'';

  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  const tbody = document.getElementById('table');
  tbody.innerHTML='';

  const filtered = allData.filter(r=>{
    if(fCol && !(r.colaborador||'').toLowerCase().includes(fCol)) return false;
    if(fTar && !(r.tarefaFinalizada||'').toLowerCase().includes(fTar)) return false;

    const d = new Date(r.inicio);
    if(start && d < new Date(start)) return false;
    if(end && d > new Date(end+"T23:59:59")) return false;

    return true;
  });

  filtered.forEach(r=>{
    tbody.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.created_at ? new Date(r.created_at).toISOString().split('T')[0] : ''}</td>
<td>${r.colaborador||''}</td>
<td>${r.tipologiaPuxada||''}</td>
<td>${r.processoGama||''}</td>
<td>${r.Documentos||''}</td>
<td>${r.tarefaFinalizada||''}</td>
<td>${r.inicio?new Date(r.inicio).toLocaleTimeString():''}</td>
<td>${r.fim?new Date(r.fim).toLocaleTimeString():''}</td>
<td>${calcTempo(r.inicio, r.fim)}</td>
</tr>`;
  });
}

/* ================= SUMMARY ================= */
function renderTaskSummary(){

  const fUser = document.getElementById('taskUserFilter')?.value?.toLowerCase()||'';
  const start = document.getElementById('taskStart')?.value;
  const end = document.getElementById('taskEnd')?.value;

  const map={};

  allData.forEach(r=>{

    const d = new Date(r.inicio);
    if(start && d < new Date(start)) return;
    if(end && d > new Date(end+"T23:59:59")) return;

    const user = r.colaborador||'';
    const task = r.tarefaFinalizada||'';
    const docs = Number(r.Documentos||0);

    if(fUser && !user.toLowerCase().includes(fUser)) return;

    const key = user+'|'+task;

    if(!map[key]) map[key]={user,task,docs:0};

    map[key].docs += docs;
  });

  const tbody = document.getElementById('taskTable');
  tbody.innerHTML='';

  Object.values(map).forEach(r=>{
    tbody.innerHTML+=`
<tr>
<td>${r.user}</td>
<td>${r.task}</td>
<td>${r.docs}</td>
</tr>`;
  });
}

load();

</script>

</body>
</html>
