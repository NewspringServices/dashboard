<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newspring Dashboard Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#eef3f8;color:#1f2937}
.header{background:linear-gradient(90deg,#12355B,#1E5AA8);color:#fff;padding:22px 32px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:26px}
.wrapper{display:grid;grid-template-columns:320px 1fr;gap:24px;padding:24px;max-width:1500px;margin:auto}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.timeline .item{padding:12px;border-left:4px solid #2ECC71;margin:10px 0;background:#f8fafc;border-radius:8px}
.status{font-size:34px;font-weight:700;color:#2ECC71}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:20px 0}
button{border:none;border-radius:12px;padding:14px;font-weight:700;cursor:pointer;transition:.2s}
button:hover{transform:translateY(-2px)}
.login{background:#2ECC71;color:#fff}
.pause{background:#F1C40F}
.meal{background:#F39C12;color:#fff}
.training{background:#3498DB;color:#fff}
.logout{background:#E74C3C;color:#fff}
form{display:grid;gap:16px}
input,select{padding:12px;border:1px solid #dbe3ec;border-radius:10px}
.actions{display:flex;gap:10px}
.actions button{flex:1}
@media(max-width:900px){.wrapper{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
<div>
<h1>NEWSPRING Dashboard</h1>
<div>Telma Sofia Pereira Rosa • EX04904</div>
</div>
<div class="status">🟢 ONLINE</div>
</div>

<div class="wrapper">

<div class="card timeline">
<h2>Histórico</h2>
<div class="item">🟢 Login - 08:00</div>
<div class="item">☕ Pausa 1 - 10:15</div>
<div class="item">🍽 Refeição - 12:30</div>
<div class="item">📚 Formação - 15:00</div>
</div>

<div>

<div class="card">
<h2>Estado</h2>
<div class="grid">
<button class="login">🟢 Login</button>
<button class="pause">☕ Pausa 1</button>
<button class="pause">☕ Pausa 2</button>
<button class="meal">🍽 Refeição</button>
<button class="training">📚 Formação</button>
<button class="logout">🔴 Logout</button>
</div>
</div>

<div style="height:20px"></div>

<div class="card">
<h2>Produção</h2>
<form>
<label>Processo</label>
<input>

<label>Documentos</label>
<input type="number">

<label>Tarefa</label>
<select>
<option>DNP</option>
<option>DNE</option>
<option>Reembolsos Multicare</option>
<option>Formação</option>
</select>

<label>Tempo</label>
<input readonly value="00:00:00">

<div class="actions">
<button class="login" type="button">▶ Iniciar</button>
<button class="logout" type="button">■ Finalizar</button>
</div>
</form>
</div>

</div>

</div>

<!--
INTEGRAÇÃO:
Copia todo o teu JavaScript atual para o fim deste ficheiro.
Os IDs e classes podem ser adaptados conforme necessário.
-->

</body>
</html>
