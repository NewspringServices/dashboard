<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Newspring</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
    

--primary:#15803d;
--primary-light:#22c55e;
    --success:#16a34a;
    --warning:#f59e0b;
    --danger:#dc2626;

    --sidebar:#166534;

    --bg:#f4f7fb;
    --card:#ffffff;

    --text:#111827;
    --text-light:#64748b;

    --border:#e5e7eb;

    --shadow:
    0 10px 30px rgba(0,0,0,.06);

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;

    background:var(--bg);

    color:var(--text);

    min-height:100vh;

}

.app{

    display:flex;

    min-height:100vh;

}

/* =========================
   SIDEBAR
========================= */

.sidebar{

    width:280px;

    background:var(--sidebar);

    color:white;

    padding:30px;

    display:flex;

    flex-direction:column;

    justify-content:space-between;

}

.brand{

    text-align:center;

    margin-bottom:30px;

}

.brand img{

    width:220px;

    margin-bottom:15px;

}

.brand h2{

    font-size:22px;

    font-weight:700;

}

.user-card{

    display:flex;

    align-items:center;

    gap:15px;

    padding:20px;

    background:rgba(255,255,255,.05);

    border-radius:16px;

    margin-bottom:25px;

}

.avatar{

    width:55px;

    height:55px;

    border-radius:50%;

    background:linear-gradient(
        135deg,
        var(--primary),
        var(--primary-light)
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:22px;

    font-weight:700;

}

nav{

    display:flex;

    flex-direction:column;

    gap:10px;

}

nav a{

    padding:14px 18px;

    border-radius:12px;

    cursor:pointer;

    transition:.2s;

    font-weight:500;

}

nav a:hover{

    background:rgba(255,255,255,.08);

}

nav .active{

    background:rgba(59,130,246,.18);

}

/* =========================
   CONTENT
========================= */

.content{

    flex:1;

    padding:30px;

    overflow:auto;

}

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

}

.topbar h1{

    font-size:28px;

    font-weight:700;

}

/* =========================
   KPI
========================= */

.kpis{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:25px;

}

.card{

    background:var(--card);

    border-radius:20px;

    padding:25px;

    box-shadow:var(--shadow);

}

.card span{

    color:var(--text-light);

    font-size:13px;

}

.card h2{

    margin-top:10px;

    font-size:30px;

}

/* =========================
   PANELS
========================= */

.panel{

    background:var(--card);

    border-radius:20px;

    padding:25px;

    box-shadow:var(--shadow);

    margin-bottom:25px;

}

.panel h3{

    margin-bottom:20px;

    font-size:18px;

}

.dashboard-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:25px;

}

/* =========================
   STATUS CARD
========================= */

.status-card{

    background:white;

    padding:18px;

    border-radius:16px;

    text-align:center;

    border-left:6px solid var(--success);

    margin-bottom:20px;

}

#estadoLabel{

    font-size:20px;

    font-weight:700;

}
    
    .card-presenca{
    background:#ecfdf5;
    border:1px solid #bbf7d0;
    padding:16px;
    min-height:110px;
}

.card-presenca span{
    color:#166534;
    font-weight:600;
    font-size:13px;
}

.card-presenca h2{
    margin-top:8px;
    font-size:24px;
    color:#15803d;
    font-weight:700;
}

/* =========================
   BOTÕES ESTADO
========================= */

#tipoButtons{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:12px;

}

.tipo-btn{

    background:white;

    border:1px solid var(--border);

    padding:14px;

    border-radius:12px;

    font-weight:600;

    cursor:pointer;

    transition:.2s;

}

.tipo-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 8px 20px rgba(0,0,0,.08);

}

/* =========================
   ACTIONS
========================= */

.actions{

    margin-top:20px;

    display:flex;

    gap:12px;

}

button{

    border:none;

    border-radius:12px;

    padding:14px 22px;

    cursor:pointer;

    font-weight:600;

    transition:.2s;

}

button:hover{

    transform:translateY(-2px);

}

#btnSubmeter,
#startButton{

    background:var(--primary);

    color:white;

}

#btnTerminar,
#endButton{

    background:var(--danger);

    color:white;

}

/* =========================
   FORM
========================= */

.form-container{

    background:white;

    padding:25px;

    border-radius:20px;

    box-shadow:var(--shadow);

}

.titulo-gama{

    text-align:center;

    margin-bottom:20px;

    color:var(--primary);

}

.form-group{

    margin-bottom:18px;

}

.form-group label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

    font-size:14px;

}

input,
select{

    width:100%;

    height:48px;

    padding:12px;

    border-radius:12px;

    border:1px solid var(--border);

    font-size:14px;

}

input:focus,
select:focus{

    outline:none;

    border-color:var(--primary);

}

#tempoTarefa{

    background:#f8fafc;

    text-align:center;

    font-weight:700;

}

/* =========================
   HISTÓRICO
========================= */

#historicoContainer{

    display:flex;

    flex-direction:column;

}

.historico-item{

    padding:14px;

    border-left:4px solid var(--primary);

    background:#f8fafc;

    border-radius:12px;

    margin-bottom:10px;

    font-size:14px;

}

.historico-login{

    border-left-color:var(--success);

}

.historico-logout{

    border-left-color:var(--danger);

}

.historico-pausa1,
.historico-pausa2,
.historico-refeicao{

    border-left-color:var(--warning);

}

.historico-formacao{

    border-left-color:var(--primary);

}

/* =========================
   MENSAGENS
========================= */

#mensagem,
#responseMessage{

    margin-top:15px;

    text-align:center;

    font-weight:600;

}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:20px;

}

/* =========================
   MOBILE
========================= */

@media(max-width:1000px){

    .app{

        flex-direction:column;

    }

    .sidebar{

        width:100%;

    }

    .dashboard-grid{

        grid-template-columns:1fr;

    }

}

@media(max-width:768px){

    .content{

        padding:15px;

    }

    .kpis{

        grid-template-columns:1fr;



    #tipoButtons{

        grid-template-columns:1fr;

    }

    .actions{

        flex-direction:column;

    }

    button{

        width:100%;

    }

}

</style>

function formatarDuracao(horasDecimais){

    const totalSegundos = Math.round((horasDecimais || 0) * 3600);

    const horas = Math.floor(totalSegundos / 3600);
    const minutos = Math.floor((totalSegundos % 3600) / 60);
    const segundos = totalSegundos % 60;

    return `${String(horas).padStart(2,"0")}:${String(minutos).padStart(2,"0")}:${String(segundos).padStart(2,"0")}`;
}

function formatarDataHoraLocal(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+
         String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0");
}

async function existeRegistoUltimos15Min(user, tipo) {
  const agora = new Date();
  const menos15 = new Date(agora.getTime() - (15 * 60 * 1000));
  const inicioISO = formatarDataHoraLocal(menos15);
  const fimISO = formatarDataHoraLocal(agora);

  const url = `${SUPABASE_URL}/rest/v1/BPO_registosNSS?user=eq.${user}&tipo=eq.${tipo}&inicio=gte.${inicioISO}&inicio=lte.${fimISO}&select=id,inicio`;

  const res = await fetch(url, {
    headers:{
      "apikey": SUPABASE_API_KEY,
      "Authorization": `Bearer ${SUPABASE_API_KEY}`
    }
  });
  if(!res.ok) throw new Error("Erro ao verificar últimos 15 min");
  const dados = await res.json();
  return dados.length > 0;
}

function registrarHistorico(tipo, inicio, fim=null){
  if(!fim){
    registroAtualId = 'hist-' + historicoContador++;
    const div = document.createElement('div');
    div.className = 'historico-item historico-'+tipo;
    div.id = registroAtualId;
    div.textContent = tipo.charAt(0).toUpperCase()+tipo.slice(1)+' - Início: '+inicio.toLocaleTimeString('pt-BR',{hour12:false});
    historicoList.prepend(div);
  } else {
    const divAtual = document.getElementById(registroAtualId);
    const duracao=((fim-inicio)/1000/60).toFixed(1);
    divAtual.textContent += ' | Fim: '+fim.toLocaleTimeString('pt-BR',{hour12:false})+' | Duração: '+duracao+' min';
  }
}
async function enviarAoSupabase(dados, table, feedbackEl){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey": SUPABASE_API_KEY,
        "Authorization":`Bearer ${SUPABASE_API_KEY}`,
        "Prefer":"return=representation"
      },
      body: JSON.stringify(dados)
    });
    if(!res.ok){
      const errData = await res.json().catch(()=>({message:res.statusText}));
      throw new Error(errData.message||res.statusText);
    }

    // Mostra a mensagem de sucesso apenas se passou feedbackEl
    if(feedbackEl){
      if(table === "BPO_registosNSS"){
        feedbackEl.textContent = "✅ Registo enviado!";
      } else if(table === "BPO_dadosprodução"){
        feedbackEl.textContent = "✅ Tarefa finalizada e enviada!";
      }
      setTimeout(()=>{ feedbackEl.textContent = ""; }, 5000);
    }

  } catch(err){
    console.error(err);
    if(feedbackEl) feedbackEl.textContent="❌ Erro ao enviar: "+err.message;
    throw err;
  }
}

    if(tipoSelecionado === "login" || tipoSelecionado === "logout"){
      const bloqueado = await existeRegistoUltimos15Min(user, tipoSelecionado);
      if(bloqueado){
        msgEl.textContent = "⚠️ Registo já enviado";
        btnSub.disabled = true;
        setTimeout(() => { msgEl.textContent = ""; }, 5000);
        return;
      }

await enviarAoSupabase({
    data: dataHoje,
    user,
    nome,
    tipo: tipoSelecionado,
    inicio: formatarDataHoraLocal(inicioDataHora),
    fim: null,
    duracao: null
}, "BPO_registosNSS");

await atualizarRegistosHoje();

registrarHistorico(tipoSelecionado, inicioDataHora);
btnSub.disabled = true;

    } else {
      registrarHistorico(tipoSelecionado, inicioDataHora);
      btnSub.style.display = "none";
      btnTerm.style.display = "inline-block";

      btnTerm.onclick = async () => {
        fimDataHora = new Date();

        await enviarAoSupabase({
          data: dataHoje,
          user,
          nome,
          tipo: tipoSelecionado,
          inicio: formatarDataHoraLocal(inicioDataHora),
          fim: formatarDataHoraLocal(fimDataHora),
          duracao: parseFloat(((fimDataHora - inicioDataHora)/3600000).toFixed(3))
        }, "BPO_registosNSS");
await atualizarRegistosHoje();
        registrarHistorico(tipoSelecionado, inicioDataHora, fimDataHora);
        btnTerm.style.display = "none";
        btnSub.style.display = "inline-block";
        btnSub.disabled = true;
        estadoLabel.textContent = "🟢 ONLINE";
        producaoPanel.style.display = "block";
        document.querySelector(".status-card").style.borderLeftColor = "var(--success)";
      };
    }

  } catch(err){
    console.error(err);
    msgEl.textContent = "❌ Erro ao validar registo";
  }
};

// ================== Produção ==================
let inicioTarefa = null;
let intervalTarefa = null;
const startBtn = document.getElementById("startButton");
const endBtn = document.getElementById("endButton");
const tempoTarefa = document.getElementById("tempoTarefa");
const responseMessage = document.getElementById("responseMessage");

function formatHHMMSS(ms){
  const totalSec = Math.floor(ms/1000);
  const h = String(Math.floor(totalSec/3600)).padStart(2,"0");
  const m = String(Math.floor((totalSec%3600)/60)).padStart(2,"0");
  const s = String(totalSec%60).padStart(2,"0");
  return `${h}:${m}:${s}`;
}

startBtn.onclick = ()=>{
  inicioTarefa = new Date();
  startBtn.disabled=true; endBtn.disabled=false; tempoTarefa.value="Em execução...";
  intervalTarefa=setInterval(()=>{ tempoTarefa.value=formatHHMMSS(new Date()-inicioTarefa); },1000);
  responseMessage.textContent="";
};

endBtn.onclick = async ()=>{
  if(!inicioTarefa) return;
  clearInterval(intervalTarefa);
  const fim = new Date();
  const duracaoMS = fim-inicioTarefa;
  tempoTarefa.value=formatHHMMSS(duracaoMS);

  const processo = document.getElementById("processoGama").value;
  const docs = document.getElementById("documentos").value;
  const tarefaFinalizada = document.getElementById("tarefaFinalizada").value;

  try{
    await enviarAoSupabase({
      tipologiaPuxada:"",
      inicio: formatarDataHoraLocal(inicioTarefa),
      fim: formatarDataHoraLocal(fim),
      colaborador: nome,
      processoGama: processo || "",
      Documentos: parseInt(docs)||0,
      tarefaFinalizada: tarefaFinalizada,
      tempo: formatHHMMSS(duracaoMS)
    }, "BPO_dadosprodução");
    responseMessage.textContent="✅ Tarefa finalizada e enviada!";
    await atualizarKPIs();
  }catch(err){
    responseMessage.textContent="❌ Erro ao enviar: "+err.message;
  }

  startBtn.disabled=false; endBtn.disabled=true;
  inicioTarefa=null; tempoTarefa.value="00:00:00";

  startBtn.disabled = false;
endBtn.disabled = true;

// RESET CAMPOS
document.getElementById("processoGama").value = "";
document.getElementById("documentos").value = "";
document.getElementById("tarefaFinalizada").value = "";

inicioTarefa = null;
tempoTarefa.value = "00:00:00";
clearInterval(intervalTarefa);
intervalTarefa = null;

};
document.getElementById("verDetalheDocs").onclick = function(e){

    e.preventDefault();

    const detalhe = document.getElementById("detalheDocs");

    // Fecha se já estiver aberto
    if (detalhe.style.display === "block") {
        detalhe.style.display = "none";
        return;
    }

    let resumo = {};

    dadosProducao.forEach(item => {
        const tarefa = item.tarefaFinalizada || "Sem tarefa";
        resumo[tarefa] = (resumo[tarefa] || 0) + Number(item.Documentos || 0);
    });

    let html = "";

    for (const tarefa in resumo) {
        html += `
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                <span>${tarefa}</span>
                <strong>${resumo[tarefa]}</strong>
            </div>
        `;
    }

    detalhe.innerHTML = html;
    detalhe.style.display = "block";
};
