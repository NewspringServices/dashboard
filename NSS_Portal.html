<!DOCTYPE html>
<html lang="pt">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<title>Portal Colaborador Newspring</title>

<style>

/* ======================================================
   RESET
====================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Roboto',sans-serif;
  background:
    linear-gradient(
      135deg,
      #0f1720 0%,
      #13232f 25%,
      #163c2d 60%,
      #1fa463 100%
    );
  min-height:100vh;
  overflow-x:hidden;
}

/* ======================================================
   BACKGROUND EFFECT
====================================================== */

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left,
      rgba(255,255,255,0.08),
      transparent 30%),
    radial-gradient(circle at bottom right,
      rgba(255,255,255,0.05),
      transparent 25%);
  pointer-events:none;
}

/* ======================================================
   HEADER
====================================================== */

.header{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 24px;

  background:rgba(12,18,22,0.82);
  backdrop-filter:blur(14px);

  border-bottom:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 8px 30px rgba(0,0,0,0.25);
}

.logo-section{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-section img{
  height:42px;
}

.title-3d{
  font-size:22px;
  font-weight:600;
  color:white;

  text-shadow:
    0 2px 10px rgba(0,0,0,0.3);
}

/* ======================================================
   BUTTONS
====================================================== */

.header-actions{
  display:flex;
  gap:10px;
}

button{
  border:none;
  border-radius:10px;
  padding:11px 18px;
  cursor:pointer;
  font-weight:600;
  color:white;
  transition:0.25s ease;
}

button:hover{
  transform:translateY(-2px);
}

.btn-green{
  background:
    linear-gradient(
      135deg,
      #1db56c,
      #149a59
    );
}

.btn-red{
  background:
    linear-gradient(
      135deg,
      #dc2626,
      #991b1b
    );
}

/* ======================================================
   TABS
====================================================== */

.tabs{
  display:flex;
  gap:8px;

  padding:14px 18px;

  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(10px);

  border-bottom:
    1px solid rgba(255,255,255,0.08);
}

.tab{
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:500;
  transition:0.25s ease;
}

.tab:hover{
  background:rgba(255,255,255,0.08);
}

.tab.active{
  background:
    linear-gradient(
      135deg,
      #1db56c,
      #169b5b
    );
}

/* ======================================================
   VIEWS
====================================================== */

.view{
  display:none;
  padding:30px;
}

.view.active{
  display:block;
}

/* ======================================================
   CARD
====================================================== */

.card{
  background:rgba(255,255,255,0.94);
  border-radius:22px;
  max-width:700px;
  margin:auto;
  padding:28px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.18);
}

.card h2{
  margin-bottom:20px;
  color:#1e293b;
}

/* ======================================================
   FORM
====================================================== */

.form-group{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:600;
  color:#334155;
}

input,
select,
textarea{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid #dbe2ea;
  outline:none;
  font-size:14px;
  transition:0.2s;
}

input:focus,
select:focus,
textarea:focus{
  border-color:#19a463;
  box-shadow:
    0 0 0 4px rgba(25,164,99,0.15);
}

textarea{
  resize:none;
  min-height:120px;
}

.save-btn{
  width:100%;
  padding:14px;
  font-size:15px;
}

/* ======================================================
   TOAST
====================================================== */

#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#19a463;
  color:white;
  padding:14px 18px;
  border-radius:12px;
  display:none;
  font-weight:bold;
  box-shadow:
    0 8px 25px rgba(0,0,0,0.25);
}

</style>
</head>
<!-- MODAL ADMIN -->
<div id="adminModal" style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
">

  <div style="
    background:white;
    padding:25px;
    border-radius:14px;
    width:320px;
    text-align:center;
  ">

    <h3 style="margin-bottom:15px; color:#1e293b;">
      Acesso Administrador
    </h3>

    <input
      type="password"
      id="adminPass"
      placeholder="Introduzir password"
      style="
        width:100%;
        padding:12px;
        border-radius:10px;
        border:1px solid #ccc;
        margin-bottom:12px;
        text-align:center;
      "
    >

    <button onclick="checkAdmin()" style="
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1db56c;
      color:white;
      font-weight:bold;
      cursor:pointer;
    ">
      Entrar
    </button>

    <button onclick="closeAdmin()" style="
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#dc2626;
      color:white;
      cursor:pointer;
    ">
      Cancelar
    </button>

  </div>
</div>

<body>


<div class="header">

  <div class="logo-section">
    <img src="logo2.png">
    <div class="title-3d">
      Portal Colaborador Newspring
    </div>
  </div>

  <div class="header-actions">
    <button class="btn-green" onclick="admin()">
      🔐 Acesso Administrador
    </button>

    <button class="btn-red" onclick="logout()">
      ➜ Logout
    </button>
  </div>

</div>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">
    📅 Registar Disponibilidades
  </div>

  <div class="tab" onclick="showTab(1)">
    💻 Registar Erros de Teletrabalho
  </div>

  <div class="tab" onclick="showTab(2)">
    🚪 Registar Motivo de Logout
  </div>
</div>

<!-- DISPONIBILIDADES -->
<div class="view active" id="tab0">
  <div class="card">
    <h2>📅 Registar Disponibilidades</h2>

    <div class="form-group">
      <label>Nome *</label>
      <input type="text" id="nomeDisp">
    </div>

    <div class="form-group">
      <label>Equipa *</label>
      <select id="equipaDisp">
        <option value="">Selecionar</option>
        <option>Equipa 1</option>
        <option>Equipa 2</option>
      </select>
    </div>

    <div class="form-group">
      <label>Data *</label>
      <input type="date" id="dataDisp">
    </div>

    <div class="form-group">
      <label>Observações</label>
      <textarea id="obsDisp"></textarea>
    </div>

    <button class="btn-green save-btn"
      onclick="guardarDisponibilidade()">
      Guardar Disponibilidade
    </button>
  </div>
</div>

<!-- TELETRABALHO -->
<div class="view" id="tab1">
  <div class="card">
    <h2>💻 Registar Erros de Teletrabalho</h2>

    <div class="form-group">
      <label>Nome *</label>
      <input type="text" id="nomeErro">
    </div>

    <div class="form-group">
      <label>Equipa *</label>
      <select id="equipaErro">
        <option value="">Selecionar</option>
        <option>Equipa 1</option>
        <option>Equipa 2</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tipo de Erro *</label>
      <select id="tipoErro">
        <option value="">Selecionar</option>
        <option>Internet</option>
        <option>VPN</option>
        <option>Teams</option>
        <option>Computador</option>
        <option>Energia</option>
        <option>Outro</option>
      </select>
    </div>

    <div class="form-group">
      <label>Descrição *</label>
      <textarea id="descricaoErro"></textarea>
    </div>

    <button class="btn-green save-btn"
      onclick="guardarErro()">
      Guardar Erro
    </button>
  </div>
</div>

<!-- LOGOUT -->
<div class="view" id="tab2">
  <div class="card">
    <h2>🚪 Registar Motivo de Logout</h2>

    <div class="form-group">
      <label>Nome *</label>
      <input type="text" id="nomeLogout">
    </div>

    <div class="form-group">
      <label>Equipa *</label>
      <select id="equipaLogout">
        <option value="">Selecionar</option>
        <option>Equipa 1</option>
        <option>Equipa 2</option>
      </select>
    </div>

<div class="form-group">
  <label>Motivo Logout *</label>
  <textarea
    id="motivoLogout"
    placeholder="Escreva o motivo do logout..."
    required
  ></textarea>
</div>

    <div class="form-group">
      <label>Observações</label>
      <textarea id="obsLogout"></textarea>
    </div>

    <button class="btn-green save-btn"
      onclick="guardarLogout()">
      Guardar Motivo
    </button>
  </div>
</div>

<div id="toast"></div>

<script>

const SUPABASE_URL = 'https://bijndfsxrzjviwrdvwms.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpam5kZnN4cnpqdml3cmR2d21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA4NTA5NTIsImV4cCI6MjA2NjQyNjk1Mn0.EWaFInuqTaxvnjytb40DdnflEbBrbSYcViKLYc_kKBk';

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_API_KEY
);

function showTab(i){

  document.querySelectorAll('.tab')
    .forEach(t=>t.classList.remove('active'));

  document.querySelectorAll('.view')
    .forEach(v=>v.classList.remove('active'));

  document.querySelectorAll('.tab')[i]
    .classList.add('active');

  document.getElementById('tab'+i)
    .classList.add('active');
}

function toast(msg){

  const el = document.getElementById('toast');

  el.innerText = msg;
  el.style.display = 'block';

  setTimeout(()=>{
    el.style.display='none';
  },3000);
}

/* DISPONIBILIDADE */

async function guardarDisponibilidade(){

  const nome =
    document.getElementById('nomeDisp')
    .value.trim();

  const equipa =
    document.getElementById('equipaDisp')
    .value;

  const data =
    document.getElementById('dataDisp')
    .value;

  const observacoes =
    document.getElementById('obsDisp')
    .value.trim();

  // validação
  if(!nome || !equipa || !data){

    toast(
      '⚠️ Preenche os campos obrigatórios'
    );

    return;
  }

  // inserir no supabase
  const { error } = await client
    .from('disponibilidades_colaborador')
    .insert([{

      nome: nome,
      equipa: equipa,
      data_disponibilidade: data,
      observacoes: observacoes || null

    }]);

  if(error){

    console.error(error);

    toast(
      '❌ Erro ao guardar disponibilidade'
    );

    return;
  }

  // limpar formulário
  document.getElementById('nomeDisp')
    .value = '';

  document.getElementById('equipaDisp')
    .value = '';

  document.getElementById('dataDisp')
    .value = '';

  document.getElementById('obsDisp')
    .value = '';

  toast(
    '✅ Disponibilidade registada com sucesso'
  );
}
/* ERRO TELETRABALHO */
async function guardarErro(){

  const nome =
    document.getElementById('nomeErro').value.trim();

  const equipa =
    document.getElementById('equipaErro').value;

  const tipo =
    document.getElementById('tipoErro').value;

  const desc =
    document.getElementById('descricaoErro').value.trim();

  if(!nome || !equipa || !tipo || !desc){
    toast('⚠️ Preenche os campos obrigatórios');
    return;
  }

  const { error } = await client
    .from('erros_teletrabalho')
    .insert([{
      nome: nome,
      equipa: equipa,
      tipo_erro: tipo,
      descricao: desc
    }]);

  if(error){
    console.error(error);
    toast('❌ Erro ao guardar registo');
    return;
  }

  // limpar campos
  document.getElementById('nomeErro').value = '';
  document.getElementById('equipaErro').value = '';
  document.getElementById('tipoErro').value = '';
  document.getElementById('descricaoErro').value = '';

  toast('✅ Erro registado com sucesso');
}
/* LOGOUT */

async function guardarLogout(){

  const nome =
    document.getElementById('nomeLogout').value.trim();

  const equipa =
    document.getElementById('equipaLogout').value;

  const motivo =
    document.getElementById('motivoLogout').value.trim();

  const obs =
    document.getElementById('obsLogout').value.trim();

  if(!nome || !equipa || !motivo){
    toast('⚠️ Preenche os campos obrigatórios');
    return;
  }

  const { error } = await client
    .from('logouts_colaborador')
    .insert([{
      nome: nome,
      equipa: equipa,
      motivo: motivo,
      observacoes: obs || null
    }]);

  if(error){
    console.error(error);
    toast('❌ Erro ao guardar logout');
    return;
  }

  // limpar campos
  document.getElementById('nomeLogout').value = '';
  document.getElementById('equipaLogout').value = '';
  document.getElementById('motivoLogout').value = '';
  document.getElementById('obsLogout').value = '';

  toast('✅ Logout registado com sucesso');
}
function admin(){
  document.getElementById("adminModal").style.display = "flex";
}

function closeAdmin(){
  document.getElementById("adminModal").style.display = "none";
  document.getElementById("adminPass").value = "";
}

function checkAdmin(){

  const pass = document.getElementById("adminPass").value;

  const passwordsValidas = [
    "NSSWorten*2026",
  ];

  if(passwordsValidas.includes(pass)){
    window.location.href = "NSS_AcessoAdmin.html";
  } else {
    toast("❌ Password incorreta");
  }

  closeAdmin();
}

const agoraLisboa = new Date().toLocaleString("sv-SE", {
  timeZone: "Europe/Lisbon"
});

function logout(){
  window.location.href = "NSS_Portal.html.html";
}

</script>

</body>
</html>
