<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Exportar Excel</title>

  <!-- Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;

    }

    .container {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      text-align: center;
      width: 300px;
    }

    img {
      width: 120px;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;

      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;

      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #f87171;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" alt="Logo">

  <h2>Área Protegida</h2>

  <!-- LOGIN -->
  <div id="login">
    <input type="password" id="password" placeholder="Introduz a senha">
    <div id="erro" class="error"></div>
    <button onclick="login()">Entrar</button>
  </div>

  <!-- BOTÃO EXPORT -->
  <div id="app" class="hidden">
    <h2>Exportar Dados</h2>
    <button onclick="exportar()">Exportar Excel</button>
  </div>

</div>

<script>
const SENHA = "Newspring*2026"; // 🔒 MUDA ISTO

const SUPABASE_URL = 'https://bijndfsxrzjviwrdvwms.supabase.co';
const SUPABASE_API_KEY = 'A_TUA_KEY_AQUI';

function login() {
  const input = document.getElementById("password").value;

  if (input === SENHA) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  } else {
    document.getElementById("erro").innerText = "Senha incorreta";
  }
}

async function exportar() {
  try {
    const tabela = encodeURIComponent("B2B_medições");

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${tabela}?select=*`,
      {
        method: "GET",
        headers: {
          "apikey": SUPABASE_API_KEY,
          "Authorization": `Bearer ${SUPABASE_API_KEY}`
        }
      }
    );

    if (!res.ok) {
      const erro = await res.text();
      alert("Erro: " + erro);
      return;
    }

    const dados = await res.json();

    if (!dados || dados.length === 0) {
      alert("Sem dados");
      return;
    }

    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dados");

    XLSX.writeFile(wb, "dados.xlsx");

  } catch (err) {
    console.error(err);
    alert("Erro ao exportar");
  }
}
</script>

</body>
</html>
