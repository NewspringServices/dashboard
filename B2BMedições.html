
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">

  <!-- Biblioteca Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #064e3b; /* fundo verde escuro */
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #ffffff; /* quadrado branco */
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      text-align: center;
      width: 350px;
    }

    img {
      width: 180px; /* logo maior */
      height: auto;
      margin-bottom: 30px;
    }

    h2 {
      margin-bottom: 20px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      background: #f9f9f9;
      color: #111;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;         /* mesmo tamanho para login e export */
      border-radius: 8px;
      border: none;
      background: #10b981;   /* verde */
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #059669;   /* verde mais escuro ao passar o mouse */
    }

    .hidden {
      display: none;
    }

    .error {
      color: #f87171;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" alt="Logo">

  <h2>Área Protegida</h2>

  <!-- LOGIN -->
  <div id="login">
    <input type="password" id="password" placeholder="Introduz a senha">
    <div id="erro" class="error"></div>
    <button onclick="login()">Entrar</button>
  </div>

  <!-- BOTÃO EXPORT -->
  <div id="app" class="hidden">
    <button onclick="exportar()">Exportar Excel</button>
  </div>

</div>

<script>
const SENHA = "1234"; // muda para a tua senha
const SUPABASE_URL = 'https://bijndfsxrzjviwrdvwms.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpam5kZnN4cnpqdml3cmR2d21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA4NTA5NTIsImV4cCI6MjA2NjQyNjk1Mn0.EWaFInuqTaxvnjytb40DdnflEbBrbSYcViKLYc_kKBk';

function login() {
  const input = document.getElementById("password").value;
  if (input === SENHA) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  } else {
    document.getElementById("erro").innerText = "Senha incorreta";
  }
}

async function exportar() {
  try {
    const tabela = encodeURIComponent("B2B_medições");

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${tabela}?select=*`,
      {
        method: "GET",
        headers: {
          "apikey": SUPABASE_API_KEY,
          "Authorization": `Bearer ${SUPABASE_API_KEY}`
        }
      }
    );

    if (!res.ok) {
      const erro = await res.text();
      alert("Erro: " + erro);
      return;
    }

    const dados = await res.json();

    if (!dados || dados.length === 0) {
      alert("Sem dados na tabela");
      return;
    }

    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dados");
    XLSX.writeFile(wb, "Newspring_Dados_MediçõesB2B.xlsx");

  } catch (err) {
    console.error(err);
    alert("Erro ao exportar");
  }
}
</script>

</body>
</html>
