
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exportar Excel - B2B Medições</title>

  <!-- Biblioteca Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #064e3b;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      text-align: center;
      width: 350px;
    }

    img {
      width: 180px;
      height: auto;
      margin-bottom: 30px;
    }

    h2 {
      margin-bottom: 20px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      background: #f9f9f9;
      color: #111;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #10b981;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #059669;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #f87171;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" alt="Logo">

  <h2>Área Protegida</h2>

  <!-- LOGIN -->
  <div id="login">
    <input type="password" id="password" placeholder="Introduz a senha">
    <div id="erro" class="error"></div>
    <button onclick="login()">Entrar</button>
  </div>

  <!-- BOTÃO EXPORT -->
  <div id="app" class="hidden">
    <button onclick="exportar()">Exportar Excel</button>
  </div>

</div>

<script>
const SENHA = "NSS*2026";
const SUPABASE_URL = 'https://bijndfsxrzjviwrdvwms.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpam5kZnN4cnpqdml3cmR2d21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA4NTA5NTIsImV4cCI6MjA2NjQyNjk1Mn0.EWaFInuqTaxvnjytb40DdnflEbBrbSYcViKLYc_kKBk';

// LOGIN
function login() {
  const input = document.getElementById("password").value;
  if (input === SENHA) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  } else {
    document.getElementById("erro").innerText = "Senha incorreta";
  }
}

// EXPORTAÇÃO (CORRIGIDA)
async function exportar() {
  try {
    const tabela = encodeURIComponent("B2B_medições");

    let todosDados = [];
    let from = 0;
    const step = 1000;

    while (true) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${tabela}?select=data,inicio,fim,colaborador,"user",numero_caso,estado_processo,tempo,auditado`,
        {
          method: "GET",
          headers: {
            "apikey": SUPABASE_API_KEY,
            "Authorization": `Bearer ${SUPABASE_API_KEY}`,
            "Range": `${from}-${from + step - 1}`
          }
        }
      );

      if (!res.ok) {
        const erro = await res.text();
        alert("Erro: " + erro);
        return;
      }

      const dados = await res.json();

      if (dados.length === 0) break;

      todosDados = todosDados.concat(dados);

      if (dados.length < step) break;

      from += step;
    }

    if (!todosDados || todosDados.length === 0) {
      alert("Sem dados na tabela");
      return;
    }

    // Formatar datas
    const dadosFormatados = todosDados.map(d => ({
      ...d,
      inicio: d.inicio ? d.inicio.replace('T', ' ').split('+')[0] : '',
      fim: d.fim ? d.fim.replace('T', ' ').split('+')[0] : ''
    }));

    // Criar Excel
    const ws = XLSX.utils.json_to_sheet(dadosFormatados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dados");

    XLSX.writeFile(wb, "Newspring_Dados_MediçõesB2B.xlsx");

  } catch (err) {
    console.error(err);
    alert("Erro ao exportar");
  }
}
</script>

</body>
</html>
